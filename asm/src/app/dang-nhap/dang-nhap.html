<main class="flex-grow flex items-center justify-center px-4 py-24 relative overflow-hidden">
<!-- Background Decorative Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-on-tertiary-container/5 rounded-full blur-[100px]"></div>
<!-- Login Card -->
<div class="glass-card w-full max-w-md p-10 rounded-xl shadow-sm shadow-primary/5 relative z-10">
<div class="text-center mb-10">
<h1 class="text-3xl font-bold text-primary tracking-tight mb-2">Chào mừng trở lại</h1>
<p class="text-secondary font-body text-sm">Vui lòng đăng nhập để tiếp tục trải nghiệm cùng TechCore.</p>
</div>
<form class="space-y-6" (ngSubmit)="onSubmit()">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-wider text-primary opacity-60" for="email">Email của bạn</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-lg" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-surface-container-low border-0 rounded-lg focus:ring-1 focus:ring-primary/20 transition-all text-on-surface placeholder:text-outline/50" id="email" name="email" placeholder="name@company.com" type="email" [(ngModel)]="formData.email" required />
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-xs font-bold uppercase tracking-wider text-primary opacity-60" for="password">Mật khẩu</label>
<a class="text-xs font-semibold text-on-tertiary-container hover:underline transition-all" href="#">Quên mật khẩu?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-lg" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-11 pr-12 py-4 bg-surface-container-low border-0 rounded-lg focus:ring-1 focus:ring-primary/20 transition-all text-on-surface placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" type="password" [(ngModel)]="formData.mat_khau" required />
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="w-4 h-4 text-primary bg-surface-container border-0 rounded focus:ring-primary/20 cursor-pointer" id="remember" type="checkbox"/>
<label class="ml-2 text-sm text-secondary font-medium cursor-pointer select-none" for="remember">Ghi nhớ đăng nhập</label>
</div>
<div class="flex items-center justify-between">
<div></div>
<a routerLink="/quen-mat-khau" class="text-sm text-primary-container hover:text-[#e05d00] font-semibold transition-colors">
Quên mật khẩu?
</a>
</div>
<!-- Primary Action -->
<button class="w-full bg-on-tertiary-container hover:bg-orange-600 text-white font-headline font-bold py-4 rounded-full shadow-lg shadow-on-tertiary-container/20 active:scale-95 transition-all" type="submit">
    ĐĂNG NHẬP
</button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-surface-container-high"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="px-3 bg-white/50 text-outline font-semibold tracking-widest backdrop-blur-sm">Hoặc đăng nhập bằng</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-lowest border border-outline-variant/20 rounded-full hover:bg-surface-container-low transition-colors shadow-sm active:scale-95">
<img alt="Google" class="w-4 h-4" data-alt="Official Google logo icon minimalist style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCr8SvLiQyTtzbgpf4Vjwqy3s74XcaBa3wHpoyTBxx3NS8KvVZZXk-8Td1AWlJPqTj3ecK8UekG3dyOGFBSJAkAXkvj4LeEplg8SN8poOE7raxR_qE_71YGNmTTXnh0QC9y_a3fDjOWGmi9HBzLun8Ovl6tU4FDhuZtxze1rbCqcRb_Vtsx9WO_m5CNlLb_9XupEHCbpLClxlb8Td2kQD6zZXWV3dP2iEWXB7yUYhSI1KppA2G4ZcCE2Z6m_xXzrgValIhhmXYpL6C2"/>
<span class="text-sm font-semibold text-primary">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-lowest border border-outline-variant/20 rounded-full hover:bg-surface-container-low transition-colors shadow-sm active:scale-95">
<svg class="w-5 h-5 text-[#1877F2]" fill="currentColor" viewbox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path></svg>
<span class="text-sm font-semibold text-primary">Facebook</span>
</button>
</div>
<!-- Register Redirect -->
<div class="mt-10 text-center">
<p class="text-sm text-secondary font-medium">
                    Bạn chưa có tài khoản? 
                    <a class="text-primary font-bold hover:text-on-tertiary-container transition-colors ml-1" routerLink="/dang-ky">Đăng ký ngay</a>
</p>
</div>
</div>
</main>
