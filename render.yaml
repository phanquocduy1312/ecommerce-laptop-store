services:
  - type: web
    name: laptop-store-backend
    env: node
    buildCommand: cd server-node && npm install
    startCommand: cd server-node && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: DB_HOST
        fromDatabase:
          name: laptop-store-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: laptop-store-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: laptop-store-db
          property: databaseName
      - key: DB_USER
        fromDatabase:
          name: laptop-store-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: laptop-store-db
          property: password

databases:
  - name: laptop-store-db
    databaseName: laptop_node
    user: laptop_user
