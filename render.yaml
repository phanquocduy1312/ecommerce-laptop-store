services:
  - type: web
    name: laptop-store-backend
    env: node
    buildCommand: cd server-node && npm install
    startCommand: cd server-node && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: laptop-store-db
          property: connectionString

databases:
  - name: laptop-store-db
    databaseName: laptop_node
    user: laptop_user
